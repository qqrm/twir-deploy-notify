name: TWIR Fixture verify

on:
  workflow_dispatch:
    inputs:
      fixture:
        description: Fixture file from tests/ to send and verify in the dev chat
        required: true
        default: 2025-07-02-this-week-in-rust.md
      verify_updates:
        description: Attempt getUpdates-based verification after sending (may not work for channel-style chats)
        required: false
        default: 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.fixture }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  CARGO_TERM_PROGRESS_WHEN: never
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RUST_LOG: info

jobs:
  verify:
    name: Verify fixture delivery
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false
          cache-shared-key: fixture-verify
          cache-workspace-crates: true
          cache-workspaces: |
            . -> target
          rustflags: ""

      - name: Validate fixture path
        run: |
          set -euo pipefail
          test -f "tests/${{ inputs.fixture }}"

      - name: Send fixture to dev chat
        env:
          DEV_BOT_TOKEN: ${{ secrets.DEV_BOT_TOKEN }}
          DEV_CHAT_ID: ${{ secrets.DEV_CHAT_ID }}
          TWIR_SKIP_PRODUCTION_SEND: 'true'
        run: |
          set -euo pipefail

          rm -f output_*.md
          cargo run --quiet --bin twir-deploy-notify -- "tests/${{ inputs.fixture }}"

      - name: Verify delivered messages via getUpdates
        if: inputs.verify_updates == 'true'
        env:
          DEV_BOT_TOKEN: ${{ secrets.DEV_BOT_TOKEN }}
          DEV_CHAT_ID: ${{ secrets.DEV_CHAT_ID }}
        run: |
          set -euo pipefail

          cargo run --quiet --bin verify-posts -- "tests/${{ inputs.fixture }}"

      - name: Upload generated posts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: verified-fixture-posts
          path: output_*.md
          if-no-files-found: ignore
