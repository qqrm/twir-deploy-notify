name: TWIR Prod summary

on:
  schedule:
    # once per day
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  evaluate-latest:
    name: Evaluate latest TWIR post
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      should_send: ${{ steps.decide.outputs.should_send }}
      latest_post: ${{ steps.decide.outputs.latest_post }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download last_sent artifact from previous production run
        run: |
          set -euo pipefail

          prev=$(
            gh run list \
              -R "$GH_REPO" \
              -w "${{ github.workflow }}" \
              --branch main \
              --status success \
              -L 1 \
              --json databaseId \
              -q '.[0].databaseId' \
            || echo ""
          )

          if [ -n "$prev" ]; then
            success="false"
            for name in last-sent-prod last-sent; do
              if gh run download -R "$GH_REPO" "$prev" -n "$name" --dir .; then
                success="true"
                break
              fi
            done

            if [ "$success" != "true" ]; then
              echo "Previous production run $prev did not publish a last-sent artifact; continuing without cached state." >&2
            fi
          fi

      - name: Checkout TWIR
        uses: actions/checkout@v4
        with:
          repository: rust-lang/this-week-in-rust
          path: twir
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            content/

      - name: Decide whether to send notifications
        id: decide
        run: |
          set -euo pipefail

          shopt -s nullglob
          candidates=(twir/content/*-this-week-in-rust*.md)
          if [ ${#candidates[@]} -eq 0 ]; then
            echo "No TWIR issue candidates found in content/" >&2
            exit 1
          fi
          latest_post=$(printf '%s\n' "${candidates[@]}" | sort | tail -n 1)
          echo "latest_post=$latest_post" >> "$GITHUB_OUTPUT"

          last_sent=$(cat last_sent.txt 2>/dev/null || echo "")
          if [ -n "$latest_post" ] && [ "$latest_post" != "$last_sent" ]; then
            echo "should_send=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_send=false" >> "$GITHUB_OUTPUT"
          fi

  notify-dev:
    name: TWIR dev summary delivery from prod
    needs: evaluate-latest
    if: needs.evaluate-latest.outputs.should_send == 'true'
    uses: ./.github/workflows/common-delivery.yml
    secrets: inherit
    with:
      scope: dev
      send_main: false
      send_dev: true
      artifact_scope: dev-prod

  notify-prod:
    name: TWIR prod summary delivery
    needs:
      - evaluate-latest
      - notify-dev
    if: needs.evaluate-latest.outputs.should_send == 'true'
    uses: ./.github/workflows/common-delivery.yml
    secrets: inherit
    with:
      scope: prod
      send_main: true
      send_dev: false
      artifact_scope: prod
