name: TWIR CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_PROGRESS_WHEN: never

jobs:
  fmt:
    name: Rust fmt
    if: ${{ github.event_name != 'pull_request' || contains(',qqrm,dependabot[bot],', format(',{0},', github.actor)) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - name: Run cargo fmt
        run: cargo fmt --quiet --all -- --check

  clippy:
    name: Rust clippy
    if: ${{ github.event_name != 'pull_request' || contains(',qqrm,dependabot[bot],', format(',{0},', github.actor)) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false
          cache-shared-key: ci
          cache-workspace-crates: true
          cache-workspaces: |
            . -> target
          rustflags: ""

      - name: Run cargo clippy
        run: cargo clippy --quiet --all-targets --all-features -- -D warnings

  test:
    name: Rust tests
    if: ${{ github.event_name != 'pull_request' || contains(',qqrm,dependabot[bot],', format(',{0},', github.actor)) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false
          cache-shared-key: ci
          cache-workspace-crates: true
          cache-workspaces: |
            . -> target
          rustflags: ""

      - name: Run cargo test
        run: cargo test --quiet --lib --bins --all-features -- --test-threads=$(nproc)

  machete:
    name: Cargo machete
    if: ${{ github.event_name != 'pull_request' || contains(',qqrm,dependabot[bot],', format(',{0},', github.actor)) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - name: Install cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete

      - name: Run cargo machete
        run: cargo machete

  check-docs:
    name: Docs check
    if: ${{ github.event_name != 'pull_request' || contains(',qqrm,dependabot[bot],', format(',{0},', github.actor)) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false
          cache-shared-key: ci
          cache-workspace-crates: true
          cache-workspaces: |
            . -> target
          rustflags: ""

      - name: Run docs check
        run: cargo run --quiet --bin check-docs

  coverage:
    name: Coverage
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-bin: false
          cache-shared-key: coverage
          cache-workspace-crates: true
          cache-workspaces: |
            . -> target
          rustflags: ""

      - name: Install tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Run tarpaulin
        run: cargo tarpaulin --out Lcov --output-dir coverage -- --quiet

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/lcov.info
